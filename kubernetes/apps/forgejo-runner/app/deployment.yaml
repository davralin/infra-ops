apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo-runner
  labels:
    app.kubernetes.io/name: forgejo-runner
    app.kubernetes.io/component: runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo-runner
    spec:
      initContainers:
        - name: merge-config
          image: code.forgejo.org/forgejo/runner:12.7.3
          command:
            - sh
            - -c
            - |
              cp /etc/runner-base/config.yaml /tmp/config.yaml
              cat >> /tmp/config.yaml << EOS

              server:
                connections:
                  forgejo:
                    url: ${FORGEJO_URL}
                    uuid: ${FORGEJO_UUID}
                    token: ${FORGEJO_TOKEN}
              EOS
              cp /tmp/config.yaml /etc/runner/config.yaml
          env:
            - name: FORGEJO_URL
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-server
                  key: FORGEJO_URL
            - name: FORGEJO_UUID
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-server
                  key: FORGEJO_UUID
            - name: FORGEJO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-server
                  key: FORGEJO_TOKEN
          volumeMounts:
            - name: runner-base-config
              mountPath: /etc/runner-base
            - name: runner-config
              mountPath: /etc/runner
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.7.3
          command:
            - sh
            - -c
            - |
              while ! nc -z 127.0.0.1 2375 </dev/null; do
                echo 'waiting for docker daemon...'
                sleep 5
              done
              forgejo-runner --config /etc/runner/config.yaml daemon
          env:
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
          volumeMounts:
            - name: runner-config
              mountPath: /etc/runner
            - name: runner-data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
        - name: dind
          image: docker:29.3.1-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          resources:
            requests:
              cpu: 50m
              memory: 1Gi
            limits:
              memory: 2Gi
      volumes:
        - name: runner-base-config
          configMap:
            name: forgejo-runner-config
        - name: runner-config
          emptyDir: {}
        - name: runner-data
          emptyDir: {}
