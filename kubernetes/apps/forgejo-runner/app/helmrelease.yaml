---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: forgejo-runner
    namespace: flux-system
  targetNamespace: forgejo-runner
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    knownLastVersion: true

    runner:
      config:
        create: false
        existingSecret: forgejo-runner-config
        file:
          log:
            level: info
          runner:
            capacity: 1
            timeout: 3h
            labels:
              - docker
              - ubuntu-latest
              - self-hosted
            envs: {}
          container:
            docker_host: "-"
            privileged: false
            options: ""

    securityContext:
      privileged: true

    dind:
      resources:
        requests:
          cpu: 50m
          memory: 1Gi
        limits:
          memory: 2Gi

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
