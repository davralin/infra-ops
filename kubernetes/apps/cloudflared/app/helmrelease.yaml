---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name cloudflared
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: cloudflared
    namespace: flux-system
  driftDetection:
    mode: enabled
  targetNamespace: cloudflared
  install:
    createNamespace: false
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      cloudflared:
        replicas: 1
        containers:
          cloudflared:
            image:
              repository: cloudflare/cloudflared
              tag: 2026.6.0@sha256:ba461b8aa9c042156dbd39c38657fe7431bafa063220eab8d5330a523863da9f
            args:
              - tunnel
              - run
            env:
              NO_AUTOUPDATE: "true"
              TUNNEL_METRICS: 0.0.0.0:8080
              TUNNEL_TRANSPORT_PROTOCOL: http2
              TUNNEL_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: cloudflared-secret
                    key: TUNNEL_TOKEN
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: &port 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 128Mi
    service:
      cloudflared:
        controller: *name
        ports:
          http:
            port: *port
    serviceMonitor:
      cloudflared:
        serviceName: *name
        endpoints:
          - port: http
    rawResources:
      dns-egress:
        manifest:
          apiVersion: cilium.io/v2
          kind: CiliumNetworkPolicy
          spec:
            endpointSelector:
              matchLabels:
                app.kubernetes.io/controller: *name
            egress:
              - toEndpoints:
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: kube-system
                      k8s-app: kube-dns
                toPorts:
                  - ports:
                      - port: "53"
                        protocol: UDP
                      - port: "53"
                        protocol: TCP
                    rules:
                      dns:
                        - matchPattern: "*"
      cloudflare-egress:
        manifest:
          apiVersion: cilium.io/v2
          kind: CiliumNetworkPolicy
          spec:
            endpointSelector:
              matchLabels:
                app.kubernetes.io/controller: *name
            egress:
              - toFQDNs:
                  - matchName: region1.v2.argotunnel.com
                  - matchName: region2.v2.argotunnel.com
                toPorts:
                  - ports:
                      - port: "7844"
                        protocol: TCP
              - toFQDNs:
                  - matchName: api.cloudflare.com
                  - matchName: cfd-features.argotunnel.com
                toPorts:
                  - ports:
                      - port: "443"
                        protocol: TCP
      healthchecks-egress:
        manifest:
          apiVersion: cilium.io/v2
          kind: CiliumNetworkPolicy
          spec:
            endpointSelector:
              matchLabels:
                app.kubernetes.io/controller: *name
            egress:
              - toEndpoints:
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: healthchecks
                      app.kubernetes.io/controller: healthchecks
                toPorts:
                  - ports:
                      - port: "8000"
                        protocol: TCP
