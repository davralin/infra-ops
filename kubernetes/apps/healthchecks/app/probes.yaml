---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: healthchecks
  namespace: healthchecks
spec:
  module: http_2xx
  prober:
    url: blackbox-exporter.blackbox-exporter.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - "https://health.${SECRET_DEFAULT_DOMAIN}/api/v3/status/"
