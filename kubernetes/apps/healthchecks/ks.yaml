---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: healthchecks
  namespace: flux-system
spec:
  interval: 30m
  path: ./kubernetes/apps/healthchecks/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - name: global-settings
        kind: ConfigMap
        optional: false
      - name: global-settings
        kind: Secret
        optional: true
  dependsOn:
    - name: cilium
    - name: cloudflared
    - name: openebs
    - name: prometheus-operator-crds
    - name: volsync
