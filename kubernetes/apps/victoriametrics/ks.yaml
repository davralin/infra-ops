---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoriametrics
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/victoriametrics/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 10m
  dependsOn:
    - name: cilium
    - name: prometheus-operator-crds
    - name: openebs
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: global-settings
