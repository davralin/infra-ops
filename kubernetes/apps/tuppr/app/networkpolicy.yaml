---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tuppr-host-firewall
spec:
  nodeSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: talos-system-tuppr
            app.kubernetes.io/name: tuppr
            k8s:io.kubernetes.pod.namespace: talos-system
        - matchLabels:
            app.kubernetes.io/instance: kubernetes
            app.kubernetes.io/name: kubernetes-upgrade
            app.kubernetes.io/part-of: tuppr
            k8s:io.kubernetes.pod.namespace: talos-system
        - matchLabels:
            app.kubernetes.io/name: talos-upgrade
            app.kubernetes.io/part-of: tuppr
            k8s:io.kubernetes.pod.namespace: talos-system
      toPorts:
        - ports:
            - port: "50000"
              protocol: TCP
