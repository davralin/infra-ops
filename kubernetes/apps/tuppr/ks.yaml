---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tuppr
  namespace: flux-system
spec:
  interval: 30m
  path: ./kubernetes/apps/tuppr/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substituteFrom:
      - name: global-settings
        kind: ConfigMap
        optional: false
      - name: global-settings
        kind: Secret
        optional: true
  dependsOn:
    - name: cilium
    - name: prometheus-operator-crds
  wait: true
