---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name kuma
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: kuma
    namespace: flux-system
  driftDetection:
    mode: enabled
  targetNamespace: kuma
  install:
    createNamespace: false
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      kuma:
        containers:
          kuma:
            image:
              repository: ghcr.io/louislam/uptime-kuma
              tag: 2.4.0@sha256:91e963bfda569ba115206e843febb446f473ab525add4e08b2b9e3beffa16985
            env:
              TZ: "${TIMEZONE}"
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
                memory: 500Mi
              limits:
                memory: 1000Mi
    service:
      kuma:
        controller: *name
        ports:
          http:
            port: &port 3001
    persistence:
      config:
        existingClaim: kuma
        globalMounts:
          - path: /app/data
    rawResources:
      network-policy:
        manifest:
          apiVersion: cilium.io/v2
          kind: CiliumNetworkPolicy
          spec:
            endpointSelector:
              matchLabels:
                app.kubernetes.io/controller: *name
            ingress:
              - fromEndpoints:
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: cloudflared
                      app.kubernetes.io/controller: cloudflared
                toPorts:
                  - ports:
                      - port: "3001"
                        protocol: TCP
            egress:
              - toEndpoints:
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: kube-system
                      k8s-app: kube-dns
                toPorts:
                  - ports:
                      - port: "53"
                        protocol: UDP
                      - port: "53"
                        protocol: TCP
                    rules:
                      dns:
                        - matchPattern: "*"
              - toFQDNs:
                  - matchName: "${SECRET_PRIVATE_DOMAIN}"
                  - matchPattern: "*.${SECRET_PRIVATE_DOMAIN}"
                  - matchName: "${SECRET_PUBLIC_DOMAIN}"
                  - matchPattern: "*.${SECRET_PUBLIC_DOMAIN}"
                toPorts:
                  - ports:
                      - port: "443"
                        protocol: TCP
                      - port: "9500"
                        protocol: TCP
                      - port: "32400"
                        protocol: TCP
                      - port: "25565"
                        protocol: TCP
              - toFQDNs:
                  - matchName: smtp.fastmail.com
                toPorts:
                  - ports:
                      - port: "587"
                        protocol: TCP
