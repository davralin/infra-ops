---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name forgejo
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: forgejo
  driftDetection:
    mode: enabled
  targetNamespace: *name
  install:
    createNamespace: false
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: forgejo
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    gitea:
      admin:
        existingSecret: forgejo-config
        passwordMode: initialOnlyNoReset
      config:
        APP_NAME: "Forgejo"
        cache:
          ENABLED: true
          ADAPTER: redis
          HOST: redis://forgejo-valkey.forgejo.svc.cluster.local:6379
        database:
          DB_TYPE: sqlite3
        i18n:
          LANGS: en-US
          NAMES: English
        indexer:
          REPO_INDEXER_ENABLED: true
        server:
          OFFLINE_MODE: true
          LANDING_PAGE: explore
          DOMAIN: &host "git.${SECRET_DEFAULT_DOMAIN}"
          ROOT_URL: "https://git.${SECRET_DEFAULT_DOMAIN}/"
        service:
          DISABLE_REGISTRATION: true
          DEFAULT_ORG_VISIBILITY: limited
          DEFAULT_USER_VISIBILITY: limited
        repository:
          DEFAULT_PRIVATE: private
        ui:
          DEFAULT_THEME: forgejo-dark
          SHOW_USER_EMAIL: false
        queue:
          TYPE: redis
          CONN_STR: redis://forgejo-valkey.forgejo.svc.cluster.local:6379
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    image:
      rootless: true
    persistence:
      enabled: true
      create: false
      claimName: forgejo
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 50m
        memory: 1Gi
      limits:
        memory: 2Gi
    strategy:
      type: Recreate
