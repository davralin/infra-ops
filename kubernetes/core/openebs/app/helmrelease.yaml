---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
  namespace: flux-system
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: openebs
    namespace: flux-system
  driftDetection:
    mode: enabled
  targetNamespace: openebs
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
  values:
    loki:
      enabled: false
    alloy:
      enabled: false
    engines:
      local:
        lvm:
          enabled: false
        zfs:
          enabled: false
      replicated:
        mayastor:
          enabled: false
    localpv-provisioner:
      hostpathClass:
        enabled: true
        isDefaultClass: true
        basePath: /var/openebs/local
    openebs-crds:
      csi:
        volumeSnapshots:
          enabled: false
