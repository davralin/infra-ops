---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  releaseName: flux-operator
  interval: 1h
  driftDetection:
    mode: enabled
  targetNamespace: flux-system
  chartRef:
    kind: OCIRepository
    name: flux-operator
  install:
    crds: CreateReplace
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 5
  values:
    resources:
      limits:
        cpu: 500m
        memory: 384Mi
      requests:
        cpu: 25m
        memory: 128Mi
