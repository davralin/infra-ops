---
apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-images-sigstore-audit
spec:
  validationActions:
    - Audit
  failurePolicy: Ignore
  webhookConfiguration:
    timeoutSeconds: 15
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
  matchImageReferences:
    - glob: ghcr.io/*
    - glob: quay.io/*
    - glob: reg.kyverno.io/*
  validationConfigurations:
    mutateDigest: false
    verifyDigest: false
    required: true
  attestors:
    - name: github_keyless
      cosign:
        keyless:
          identities:
            - issuer: https://token.actions.githubusercontent.com
              subjectRegExp: ^https://github.com/.+/.github/workflows/.+@refs/.+$
        ctlog:
          url: https://rekor.sigstore.dev
  validations:
    - expression: >-
        images.containers.map(image, verifyImageSignatures(image, [attestors.github_keyless])).all(result, result > 0)
      message: image signature could not be verified with Sigstore keyless signing
