---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name kyverno
  namespace: flux-system
spec:
  interval: 30m
  releaseName: kyverno
  chartRef:
    kind: OCIRepository
    name: kyverno
    namespace: flux-system
  driftDetection:
    mode: enabled
  targetNamespace: kyverno
  dependsOn:
    - name: prometheus-operator-crds
      namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    config:
      resourceFiltersExclude:
        - '[*/*,kube-public,*]'
        - '[*/*,kube-node-lease,*]'
    admissionController:
      serviceMonitor:
        enabled: true
    backgroundController:
      serviceMonitor:
        enabled: true
    cleanupController:
      serviceMonitor:
        enabled: true
    reportsController:
      serviceMonitor:
        enabled: true
    webhooksCleanup:
      podLabels:
        app.kubernetes.io/part-of: kyverno
        app.kubernetes.io/instance: kyverno
        app.kubernetes.io/component: webhooks-cleanup
    crds:
      migration:
        podLabels:
          app.kubernetes.io/part-of: kyverno
          app.kubernetes.io/instance: kyverno
          app.kubernetes.io/component: crds-migration
