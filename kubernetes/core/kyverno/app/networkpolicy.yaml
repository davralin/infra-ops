---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: kyverno
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# admission-controller: receives webhook calls from kube-apiserver (9443),
# and calls kube-apiserver for certificate/config management (443/6443)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: admission-controller
  namespace: kyverno
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: kyverno
      app.kubernetes.io/instance: kyverno
      app.kubernetes.io/component: admission-controller
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
# admission-controller-image-verification: verifies image signatures against
# public registries and Sigstore endpoints.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: admission-controller-image-verification
  namespace: kyverno
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: kyverno
      app.kubernetes.io/instance: kyverno
      app.kubernetes.io/component: admission-controller
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: ghcr.io
        - matchName: pkg-containers.githubusercontent.com
        - matchName: quay.io
        - matchName: cdn.quay.io
        - matchName: registry.k8s.io
        - matchName: reg.kyverno.io
        - matchName: docker.io
        - matchName: registry-1.docker.io
        - matchName: auth.docker.io
        - matchName: index.docker.io
        - matchName: production.cloudflare.docker.com
        - matchName: rekor.sigstore.dev
        - matchName: fulcio.sigstore.dev
        - matchName: tuf-repo-cdn.sigstore.dev
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# background-controller: watches resources and generates/mutates via kube-apiserver only
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: background-controller
  namespace: kyverno
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: kyverno
      app.kubernetes.io/instance: kyverno
      app.kubernetes.io/component: background-controller
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
# cleanup-controller: receives webhook calls for cleanup policies (9443),
# and calls kube-apiserver (443/6443)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cleanup-controller
  namespace: kyverno
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: kyverno
      app.kubernetes.io/instance: kyverno
      app.kubernetes.io/component: cleanup-controller
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
# reports-controller: watches resources and writes reports via kube-apiserver only
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: reports-controller
  namespace: kyverno
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: kyverno
      app.kubernetes.io/instance: kyverno
      app.kubernetes.io/component: reports-controller
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
# pre-delete hooks: scale controllers to zero and remove webhook configurations
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: webhooks-cleanup
  namespace: kyverno
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: kyverno
      app.kubernetes.io/instance: kyverno
      app.kubernetes.io/component: webhooks-cleanup
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
# post-upgrade migration job: migrates Kyverno CRDs between versions
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: crds-migration
  namespace: kyverno
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: kyverno
      app.kubernetes.io/instance: kyverno
      app.kubernetes.io/component: crds-migration
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
