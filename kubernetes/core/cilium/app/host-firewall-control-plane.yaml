---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: host-firewall-control-plane
spec:
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
  ingress:
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    - fromEntities:
        - host
        - remote-node
        - kube-apiserver
        - cluster
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    - fromEntities:
        - host
        - kube-apiserver
      toPorts:
        - ports:
            - port: "2379"
              protocol: TCP
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "2380"
              protocol: TCP
