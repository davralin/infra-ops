---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name cert-manager
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *name
    namespace: flux-system
  driftDetection:
    mode: enabled
  targetNamespace: cert-manager
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 10
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    crds:
      enabled: true
      keep: true
    replicaCount: 1
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
