---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cloudnative-pg-rules
  namespace: cloudnative-pg
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: cloudnative-pg.rules
      rules:
        - alert: LongRunningTransaction
          annotations:
            description: >-
              Pod {{ $labels.pod }} is taking more than 5 minutes (300 seconds)
              for a query.
            summary: A query is taking longer than 5 minutes.
          expr: cnpg_backends_max_tx_duration_seconds > 300
          for: 1m
          labels:
            severity: warning
        - alert: BackendsWaiting
          annotations:
            description: >-
              Pod {{ $labels.pod }} has been waiting for longer than 5 minutes.
            summary: A backend has been waiting for longer than 5 minutes.
          expr: cnpg_backends_waiting_total > 300
          for: 1m
          labels:
            severity: warning
        - alert: PGDatabaseXIDAge
          annotations:
            description: >-
              Over 150,000,000 transactions from frozen xid on pod
              {{ $labels.pod }}.
            summary: >-
              Number of transactions from the frozen XID to the current one
              exceeds threshold.
          expr: cnpg_pg_database_xid_age > 150000000
          for: 1m
          labels:
            severity: warning
        - alert: PGReplicationLag
          annotations:
            description: >-
              Standby {{ $labels.pod }} is lagging behind by over 600 seconds
              (10 minutes).
            summary: The standby is lagging behind the primary.
          expr: cnpg_pg_replication_lag > 600
          for: 1m
          labels:
            severity: warning
        - alert: DatabaseDeadlockConflicts
          annotations:
            description: >-
              There are over 10 deadlock conflicts in {{ $labels.pod }}.
            summary: Checks the number of database conflicts.
          expr: cnpg_pg_database_deadlocks > 10
          for: 1m
          labels:
            severity: warning
