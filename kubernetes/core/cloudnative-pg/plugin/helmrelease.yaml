---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name plugin-barman-cloud
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *name
    namespace: flux-system
  driftDetection:
    mode: enabled
  targetNamespace: cloudnative-pg
  dependsOn:
    - name: cloudnative-pg
      namespace: flux-system
    - name: cert-manager
      namespace: flux-system
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 10
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 10
  values:
    fullnameOverride: *name
    crds:
      create: true
