---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: flux-system
spec:
  interval: 30m
  driftDetection:
    mode: enabled
  chartRef:
    kind: OCIRepository
    name: metrics-server
    namespace: flux-system
  targetNamespace: metrics-server
  install:
    createNamespace: false
    remediation:
      retries: 10
  upgrade:
    remediation:
      retries: 10
  values:
    fullnameOverride: metrics-server
    args:
      - --kubelet-insecure-tls
    resources:
      requests:
        cpu: 25m
        memory: 200Mi
    metrics:
      enabled: true
    serviceMonitor:
      enabled: true
