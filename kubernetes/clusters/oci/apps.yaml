---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: core
  path: ./kubernetes/apps/oci
  # Keep disabled for the initial handoff from parent-owned app resources to per-app Kustomizations.
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
