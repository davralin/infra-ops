---
apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    # renovate: datasource=github-releases depName=fluxcd/flux2
    version: "2.8.8"
    registry: ghcr.io/fluxcd
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  cluster:
    type: kubernetes
    size: small
    networkPolicy: false
  sync:
    kind: GitRepository
    url: https://github.com/davralin/infra-ops
    ref: refs/heads/main
    path: kubernetes/clusters/oci
  kustomize:
    patches:
      - target:
          kind: Deployment
          name: helm-controller
        patch: |
          - op: replace
            path: /spec/template/spec/containers/0/resources/requests/cpu
            value: 50m
      - target:
          kind: Deployment
          name: kustomize-controller
        patch: |
          - op: replace
            path: /spec/template/spec/containers/0/resources/requests/cpu
            value: 50m
      - target:
          kind: Deployment
          name: source-controller
        patch: |
          - op: replace
            path: /spec/template/spec/containers/0/resources/requests/cpu
            value: 25m
      - target:
          kind: Deployment
          name: notification-controller
        patch: |
          - op: replace
            path: /spec/template/spec/containers/0/resources/requests/cpu
            value: 10m
